    <script>
        // =====================
        // CURSOR EFFECT
        // =====================
        const cursor = document.querySelector('.cursor');
        const cursorDot = document.querySelector('.cursor-dot');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
            cursorDot.style.left = e.clientX - 2 + 'px';
            cursorDot.style.top = e.clientY - 2 + 'px';
        });

        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'scale(0.8)';
        });

        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'scale(1)';
        });

        // =====================
        // PARALLAX EFFECT
        // =====================
        const container = document.getElementById('parallaxContainer');
        const videoContainer = document.querySelector('.video-container');
        
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 50;
            const y = (window.innerHeight / 2 - e.clientY) / 50;
            
            videoContainer.style.transform = `translate(${x * 0.5}px, ${y * 0.5}px) scale(1.05)`;
            
            document.querySelectorAll('[data-speed]').forEach(el => {
                const speed = parseFloat(el.dataset.speed);
                el.style.transform = `translate(${x * speed * 20}px, ${y * speed * 20}px)`;
            });
        });

        // =====================
        // LANGUAGE SWITCHER
        // =====================
        const translations = {
            ru: 'ПОШЁЛ НАХУЙ',
            en: 'FUCK OFF',
            pl: 'PIERDOL SIĘ',
            tr: 'SİKTİR GİT'
        };

        const mainText = document.getElementById('mainText');
        const langSpans = document.querySelectorAll('.lang-indicator span');
        let currentLang = 'ru';
        let langIndex = 0;
        const langOrder = ['ru', 'en', 'pl', 'tr'];

        function switchLanguage() {
            langIndex = (langIndex + 1) % langOrder.length;
            currentLang = langOrder[langIndex];
            
            // Glitch transition
            mainText.style.opacity = '0';
            mainText.style.transform = 'scale(1.1) skewX(10deg)';
            mainText.style.filter = 'blur(10px)';
            
            setTimeout(() => {
                mainText.textContent = translations[currentLang];
                mainText.style.opacity = '1';
                mainText.style.transform = 'scale(1) skewX(0deg)';
                mainText.style.filter = 'blur(0px)';
            }, 200);

            // Update indicators
            langSpans.forEach(span => {
                span.classList.toggle('active', span.dataset.lang === currentLang);
            });
        }

        // Auto-switch every 3 seconds
        setInterval(switchLanguage, 3000);

        // =====================
        // PARTICLES
        // =====================
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.life = Math.random() * 100 + 100;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life--;
                
                if (this.life <= 0 || this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        const particles = Array.from({ length: 100 }, () => new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        setTimeout(() => {
            if (video.readyState === 0) {
                video.style.display = 'none';
                bgImage.style.display = 'block';
            }
        }, 1000);
    </script>
</body>
